theme = "custom"

[editor]
auto-format = false
indent-heuristic = "simple"
scrolloff = 1
completion-trigger-len = 1
completion-timeout = 5
rulers = [80, 100]
smart-tab.enable = false
file-picker.hidden = false
soft-wrap.enable = true
indent-guides.render = true
inline-diagnostics.cursor-line = "hint"
cursor-shape.insert = "bar"

[editor.auto-save]
focus-lost = true
after-delay.enable = true
after-delay.timeout = 1000

[editor.statusline]
left = [
  "spinner",
  "total-line-numbers",
  "file-name",
  "read-only-indicator",
  "spacer",
  "spacer",
  "spacer",
  "version-control",
]
center = [
  "register",
]
right = [
  "diagnostics",
  "spacer",
  "spacer",
  "primary-selection-length",
  "selections",
  "spacer",
  "spacer",
  "position",
]

[keys.normal]
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"
"C-y" = "scroll_up"
"C-e" = "scroll_down"
"A-w" = "move_next_sub_word_start"
"A-b" = "move_prev_sub_word_start"
"A-e" = "move_next_sub_word_end"
"A-l" = "@*vnv"
"A-S-l" = "@*vNv"
"A-S-i" = ":fmt"

[keys.select]
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"
"C-y" = "scroll_up"
"C-e" = "scroll_down"
"A-w" = "extend_next_sub_word_start"
"A-b" = "extend_prev_sub_word_start"
"A-e" = "extend_next_sub_word_end"
"A-l" = "@*n"
"A-S-l" = "@*N"
"A-S-i" = ":fmt"

[keys.insert]
"C-y" = "scroll_up"
"C-e" = "scroll_down"
"A-S-i" = ":fmt"
"A-ret" = "@<esc>O"
